# Base configuration with common fields (versions, ports, volumes).
name: drap

services:
  postgres:
    pull_policy: build
    build: ./docker/postgres
    ports:
      - 5432:5432
    volumes:
      - postgres:/var/lib/postgresql/data
    networks:
      - database
    restart: always
    healthcheck:
      test: ['CMD', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5

  inngest:
    image: inngest/inngest:v1.17.9
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - queue
    ports:
      - 8288:8288
    restart: always
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://localhost:8288/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  o2:
    pull_policy: build
    build: ./docker/openobserve
    environment:
      ZO_DATA_DIR: /data
    ports:
      - 5080:5080
    volumes:
      - open-observe:/data
    networks:
      - telemetry
    restart: always
    healthcheck:
      test: ['CMD', '/httpget', 'http://localhost:5080/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.72
    ports:
      - 9000:9000
      - 9001:9001
    volumes:
      - rustfs-data:/data
      - rustfs-logs:/logs
    networks:
      - storage
    restart: always
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'curl --fail --silent --show-error http://127.0.0.1:9000/health && curl --fail --silent --show-error http://127.0.0.1:9001/rustfs/console/health',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  open-observe:
  postgres:
  rustfs-data:
  rustfs-logs:

networks:
  database:
  queue:
  storage:
  telemetry:
